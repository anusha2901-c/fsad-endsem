services:
  - type: static_site
    name: edulearn-frontend
    runtime: static
    buildCommand: cd fsad-review1-main && npm install && npm run build
    staticPublishPath: fsad-review1-main/dist
    envVars:
      - key: NODE_ENV
        value: production
    routes:
      - path: /
        destination: /index.html

  - type: web_service
    name: edulearn-backend
    runtime: java
    buildCommand: cd backend && mvn clean install -DskipTests
    startCommand: java -jar backend/target/edulearn-backend-1.0.0.jar
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SERVER_PORT
        value: 8080
    healthCheckPath: /api/health
